name: ship-it🚀

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/ship-it.yml'
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy frontend to VPS (manual)'
        type: boolean
        required: false
        default: false
      deploy_backend:
        description: 'Deploy backend to VPS (manual)'
        type: boolean
        required: false
        default: false

concurrency:
  group: ship-it-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_PORT: ${{ secrets.VPS_PORT }}
  VPS_USER: ${{ secrets.VPS_USER }}

jobs:

  # ---------------------------------------------------------
  # JOB 1 - change detection
  # ---------------------------------------------------------
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.out.outputs.frontend }}
      backend:  ${{ steps.out.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Final flags (push + manual override)
        id: out
        shell: bash
        run: |
          fe="${{ steps.filter.outputs.frontend }}"
          be="${{ steps.filter.outputs.backend }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            fe="${{ github.event.inputs.deploy_frontend }}"
            be="${{ github.event.inputs.deploy_backend }}"
          fi

          echo "frontend=$fe" >> "$GITHUB_OUTPUT"
          echo "backend=$be"  >> "$GITHUB_OUTPUT"
          echo "frontend=$fe  backend=$be"

  # ---------------------------------------------------------
  # JOB 2 - secrets check
  # ---------------------------------------------------------
  secrets-check:
    name: secrets-check
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      ssh_ok: ${{ steps.out.outputs.ssh_ok }}
    steps:
      - id: out
        shell: bash
        run: |
          ssh_ok=false
          if [ -n "${{ secrets.VPS_HOST }}" ] && \
             [ -n "${{ secrets.VPS_USER }}" ] && \
             [ -n "${{ secrets.VPS_KEY }}"  ]; then
            ssh_ok=true
          fi
          echo "ssh_ok=$ssh_ok" >> "$GITHUB_OUTPUT"
          echo "ssh_ok=$ssh_ok"

  # ---------------------------------------------------------
  # JOB 3 - Frontend build
  # ---------------------------------------------------------
  frontend-build:
    name: frontend-build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        env:
          NEXT_PUBLIC_PAYLOAD_URL: https://davelopment.hu
          NEXT_PUBLIC_API_URL: https://davelopment.hu
        run: pnpm build

      - name: Bundle (.next + public, no node_modules)
        shell: bash
        run: |
          cd ..
          tar -czf frontend_bundle.tgz \
            --exclude="frontend/node_modules" \
            --exclude="frontend/.env*" \
            frontend/

      - uses: actions/upload-artifact@v4
        with:
          name: frontend_bundle
          path: frontend_bundle.tgz
          if-no-files-found: error
          retention-days: 3

  # ---------------------------------------------------------
  # JOB 4 - Backend build
  # ---------------------------------------------------------
  backend-build:
    name: backend-build
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install
        working-directory: backend
        run: pnpm install --frozen-lockfile=false

      - name: Build Payload
        working-directory: backend
        env:
          NODE_ENV: production
          PAYLOAD_SECRET: build-placeholder
          DATABASE_URI: file:./build-placeholder.db
          NEXT_PUBLIC_SERVER_URL: https://davelopment.hu
        run: pnpm build

      - name: Bundle (no node_modules / media / env)
        shell: bash
        run: |
          tar -czf backend_bundle.tgz \
            --exclude="backend/node_modules" \
            --exclude="backend/public/media" \
            --exclude="backend/public/uploads" \
            --exclude="backend/.env*" \
            --exclude="backend/.next/cache" \
            --exclude="backend/media" \
            backend/

      - uses: actions/upload-artifact@v4
        with:
          name: backend_bundle
          path: backend_bundle.tgz
          if-no-files-found: error
          retention-days: 3

  # ---------------------------------------------------------
  # JOB 5 - Frontend deploy
  # ---------------------------------------------------------
  deploy-frontend:
    name: deploy-frontend
    needs: [changes, frontend-build, secrets-check, deploy-backend]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      needs.frontend-build.result == 'success' &&
      needs.secrets-check.outputs.ssh_ok == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    env:
      REMOTE_PATH: /var/www/davelopment/frontend
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend_bundle
          path: .

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Unpack bundle
        run: tar -xzf frontend_bundle.tgz

      - name: Remove chattr protection
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} \
            "sudo chattr -i /home/deploy/.cache && sudo chattr -i /var/www/davelopment/frontend"

      - name: Ensure remote dir
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} "mkdir -p ${REMOTE_PATH}"

      - name: Upload via rsync
        run: |
          rsync -avz --delete \
            --exclude "node_modules" \
            --exclude ".env*" \
            -e "ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes" \
            frontend/ ${VPS_USER}@${VPS_HOST}:${REMOTE_PATH}/

      - name: Write frontend .env on VPS
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} "printf '%s\n' \
              'WEBSITE_URL=https://davelopment.hu' \
              'NEXT_PUBLIC_STRAPI_URL=https://davelopment.hu' \
              'NEXT_PUBLIC_API_URL=https://davelopment.hu' \
              'NEXT_PUBLIC_PAYLOAD_URL=https://davelopment.hu' \
              'PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}' \
              > /var/www/davelopment/frontend/.env"

      - name: Install deps and restart PM2
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} <<'EOF'
          set -e
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          corepack enable || true
          corepack prepare pnpm@latest --activate || true

          cd /var/www/davelopment/frontend
          pnpm install --frozen-lockfile=false --prefer-offline

          pm2 describe frontend >/dev/null 2>&1 && \
            pm2 restart frontend --update-env || \
            pm2 start "pnpm start" --name frontend --cwd /var/www/davelopment/frontend

          pm2 save
          EOF

      - name: Smoke test frontend
        run: |
          sleep 5
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L \
              --connect-timeout 5 --max-time 15 \
              https://davelopment.hu/ || echo 000)
            echo "try=$i code=$code"
            [ "$code" -ge 200 ] && [ "$code" -lt 400 ] && exit 0
            sleep 3
          done
          echo "Frontend smoke test failed"
          exit 1

      - name: Restore chattr protection
        if: always()
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} \
            "sudo chattr +i /home/deploy/.cache && sudo chattr +i /var/www/davelopment/frontend" || true

  # ---------------------------------------------------------
  # JOB 6 - Backend deploy (atomic + rollback)
  # ---------------------------------------------------------
  deploy-backend:
    name: deploy-backend
    needs: [changes, backend-build, secrets-check]
    runs-on: ubuntu-latest
    if: >-
      needs.changes.outputs.backend == 'true' &&
      needs.backend-build.result == 'success' &&
      needs.secrets-check.outputs.ssh_ok == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend_bundle
          path: .

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload bundle via rsync
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes" \
            backend_bundle.tgz ${VPS_USER}@${VPS_HOST}:/tmp/backend_bundle.tgz

      - name: Remove chattr protection
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} \
            "sudo chattr -i /home/deploy/.cache"

      - name: Deploy on VPS (atomic + rollback)
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=60 \
            ${VPS_USER}@${VPS_HOST} bash -s << 'ENDSSH'
          DEPLOY_SHA="${{ github.sha }}"
          PAYLOAD_SECRET="${{ secrets.PAYLOAD_SECRET }}"
          DATABASE_URI="${{ secrets.DATABASE_URI }}"
          PREVIEW_SECRET="${{ secrets.PREVIEW_SECRET }}"
          GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          NOTIFY_EMAIL="${{ secrets.NOTIFY_EMAIL }}"
          set -Eeuo pipefail

          LIVE_DIR="/var/www/davelopment/backend"
          STORAGE_ROOT="/var/www/davelopment/storage"
          STORAGE_UPLOADS="${STORAGE_ROOT}/uploads"
          PNPM_STORE_DIR="/var/www/davelopment/.pnpm-store"

          TS="$(date +%F_%H%M%S)"
          NEW_DIR="${LIVE_DIR}.new_${DEPLOY_SHA}"
          PREV_DIR="${LIVE_DIR}.prev_${TS}"
          TMP_DIR="/tmp/backend_deploy_${DEPLOY_SHA}"

          log(){ printf '[%s] %s\n' "$(date -Is)" "$*"; }

          mkdir -p "$STORAGE_UPLOADS" "$PNPM_STORE_DIR"

          rm -rf "$TMP_DIR" && mkdir -p "$TMP_DIR"
          tar -xzf /tmp/backend_bundle.tgz -C "$TMP_DIR"
          rm -f /tmp/backend_bundle.tgz

          rm -rf "$NEW_DIR" && mkdir -p "$NEW_DIR"
          rsync -a --delete \
            --exclude 'public/uploads/' \
            --exclude 'public/media/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'node_modules' \
            "${TMP_DIR}/backend/" "${NEW_DIR}/"
          rm -rf "$TMP_DIR"

          log "Writing .env from secrets..."
          printf '%s\n' \
            "NODE_ENV=production" \
            "PAYLOAD_DB_PUSH=true" \
            "PORT=1337" \
            "NEXT_PUBLIC_SERVER_URL=https://davelopment.hu" \
            "PAYLOAD_PUBLIC_SERVER_URL=https://davelopment.hu" \
            "FRONTEND_URL=https://davelopment.hu" \
            "PAYLOAD_SECRET=${PAYLOAD_SECRET}" \
            "DATABASE_URI=${DATABASE_URI}" \
            "PREVIEW_SECRET=${PREVIEW_SECRET}" \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "RESEND_API_KEY=${RESEND_API_KEY}" \
            "RESEND_FROM_EMAIL=hello@davelopment.hu" \
            "NOTIFY_EMAIL=${NOTIFY_EMAIL}" \
            > "${NEW_DIR}/.env"

          printf '%s\n' \
            "enable-pre-post-scripts=true" \
            "store-dir=${PNPM_STORE_DIR}" \
            "allow-build[]=sharp" \
            "allow-build[]=esbuild" \
            "allow-build[]=@parcel/watcher" \
            > "${NEW_DIR}/.npmrc"

          mkdir -p "${NEW_DIR}/public"
          ln -sfn "$STORAGE_UPLOADS" "${NEW_DIR}/public/uploads"
          ln -sfn "$STORAGE_UPLOADS" "${NEW_DIR}/media"

          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          corepack enable || true
          corepack prepare pnpm@latest --activate || true

          log "Installing deps in new release..."
          cd "$NEW_DIR"
          export NODE_OPTIONS="--max-old-space-size=1024"
          pnpm install \
            --prod \
            --frozen-lockfile=false \
            --prefer-offline \
            --network-concurrency 1 \
            --ignore-scripts=false

          log "Rebuilding sharp native module..."
          npm --cache /tmp/npm-sharp-cache \
            --prefix "${NEW_DIR}/node_modules/.pnpm/sharp@0.32.6/node_modules/sharp" \
            run install || true

          log "Running database migrations..."
          cd "$NEW_DIR"
          NODE_ENV=production pnpm payload migrate || {
            log "Migration failed — aborting deploy"
            exit 1
          }

          log "Stopping backend..."
          cd ~
          pm2 stop backend || true

          [ -d "$LIVE_DIR" ] && mv "$LIVE_DIR" "$PREV_DIR"
          mv "$NEW_DIR" "$LIVE_DIR"

          log "Starting backend..."
          pm2 describe backend >/dev/null 2>&1 && \
            pm2 restart backend --update-env || \
            pm2 start "pnpm start" --name backend --cwd "$LIVE_DIR"
          pm2 save

          log "Waiting for Payload to boot (45s)..."
          sleep 45

          smoke_ok=0
          for i in $(seq 1 24); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L \
              --connect-timeout 3 --max-time 10 \
              "http://127.0.0.1:1337/api/health" || echo 000)
            log "smoke try=$i code=$code"
            [ "$code" -ge 200 ] && [ "$code" -lt 400 ] && { smoke_ok=1; break; }
            pm2_status=$(pm2 jlist 2>/dev/null | python3 -c "
          import sys, json
          procs = json.load(sys.stdin)
          be = [p for p in procs if p.get('name') == 'backend']
          print(be[0]['pm2_env']['status'] if be else 'unknown')
          " 2>/dev/null || echo "unknown")
            if [ "$pm2_status" = "errored" ] || [ "$pm2_status" = "stopped" ]; then
              log "Backend process died (status=$pm2_status), aborting smoke test"
              break
            fi
            sleep 5
          done

          if [ "$smoke_ok" -ne 1 ]; then
            log "SMOKE FAILED - dumping last PM2 logs..."
            pm2 logs backend --lines 50 --nostream || true
            log "Rolling back..."
            cd ~
            pm2 stop backend || true
            rm -rf "$LIVE_DIR"
            [ -d "$PREV_DIR" ] && mv "$PREV_DIR" "$LIVE_DIR"
            pm2 restart backend --update-env || true
            pm2 save
            log "Rollback done"
            exit 1
          fi

          ls -dt /var/www/davelopment/backend.prev_* 2>/dev/null \
            | tail -n +3 | xargs -r rm -rf || true
          ls -dt /var/www/davelopment/backend.new_* 2>/dev/null \
            | xargs -r rm -rf || true

          log "DEPLOY DONE"
          ENDSSH

      - name: Restore chattr protection
        if: always()
        run: |
          ssh -i ~/.ssh/id_ci -p ${VPS_PORT} -o IdentitiesOnly=yes \
            ${VPS_USER}@${VPS_HOST} \
            "sudo chattr +i /home/deploy/.cache" || true
